version: '3.8'

services:
  crop-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-crop-recommendation-secret-key-change-in-production}
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Optional: Mount logs directory
      - ./logs:/app/logs

  # Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crop-app
    restart: unless-stopped
    profiles:
      - production  # Use 'docker-compose --profile production up' to include nginx

  # Optional: Add monitoring with health checks
  monitoring:
    build: .
    command: python monitor.py --url http://crop-app:5000
    depends_on:
      - crop-app
    restart: unless-stopped
    profiles:
      - monitoring  # Use 'docker-compose --profile monitoring up' to include monitoring
