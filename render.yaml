services:
  - type: web
    name: crop-recommendation-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
    # Example deployed at: https://crop-recommendation-system-92h3.onrender.com/
